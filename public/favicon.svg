<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna -->
  <line x1="32" y1="2" x2="32" y2="10" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="2" r="2.5" fill="#0891b2"/>
  <!-- Head shape - rounded square for robotic look -->
  <rect x="8" y="12" width="48" height="46" rx="10" ry="10" fill="#0891b2"/>
  <!-- Inner face plate - white -->
  <rect x="13" y="17" width="38" height="36" rx="7" ry="7" fill="#ffffff"/>
  <!-- Eyes - rectangular robotic -->
  <rect x="19" y="25" width="8" height="6" rx="1.5" fill="#0891b2"/>
  <rect x="37" y="25" width="8" height="6" rx="1.5" fill="#0891b2"/>
  <!-- Eye shine -->
  <rect x="20.5" y="26" width="2.5" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <rect x="38.5" y="26" width="2.5" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <!-- Clock display - digital style mouth area -->
  <rect x="18" y="37" width="28" height="10" rx="3" fill="#0891b2" opacity="0.12"/>
  <!-- Clock hands forming a smile -->
  <line x1="25" y1="42" x2="32" y2="42" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="39" y2="38" stroke="#0891b2" stroke-width="2" stroke-linecap="round"/>
  <!-- Small bolts on sides -->
  <circle cx="11" cy="35" r="2" fill="#06b6d4"/>
  <circle cx="53" cy="35" r="2" fill="#06b6d4"/>
</svg>
