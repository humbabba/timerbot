<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="28" fill="#1a1a2e" stroke="#33ff33" stroke-width="3"/>
  <!-- Hour marks -->
  <circle cx="32" cy="8" r="2" fill="#33ff33"/>
  <circle cx="56" cy="32" r="2" fill="#33ff33"/>
  <circle cx="32" cy="56" r="2" fill="#33ff33"/>
  <circle cx="8" cy="32" r="2" fill="#33ff33"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="32" y1="32" x2="32" y2="13" stroke="#33ff33" stroke-width="3" stroke-linecap="round"/>
  <!-- Hour hand (pointing to 2) -->
  <line x1="32" y1="32" x2="44" y2="20" stroke="#33ff33" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#33ff33"/>
  <!-- Friendly smile -->
  <path d="M22 38 Q32 48 42 38" fill="none" stroke="#33ff33" stroke-width="2" stroke-linecap="round"/>
</svg>
